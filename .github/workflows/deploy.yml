name: Deploy

# Mirrors the manual release flow: bun install → build (regenerates routeTree +
# emits dist/server/wrangler.json) → wrangler deploy to the getctx-sh Worker.
on:
  push:
    branches: [main]
  workflow_dispatch:

# never let two deploys race the same Worker
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14 # matches the lockfile + locally verified build

      # frozen lockfile = reproducible + skips bunfig's minimumReleaseAge resolution
      - run: bun install --frozen-lockfile

      - run: bun run web:build

      # official action, pinned to the wrangler version verified locally
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4.98.0"
          command: deploy -c web/dist/server/wrangler.json
